<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script src="main.js"></script>
    <header>
        <nav class="menu">
            <a href="./index.html">Início</a>
            <a href="#">Catálogo</a>
            <div class="carrinho-icon" onclick="mostrarCarrinho()">
                🛒 <span id="total-itens">0</span>
            </div>
        </nav>
    </header>

    <main>
        <h1>Catálogo de Rações</h1>
        <h2>Confira os produtos que seu pet vai gostar!</h2>

        <!-- FILTRO - ALGO A MAIS 1 -->
        <div class="filtros">
            <button class="filtro-btn ativo" onclick="filtrarProdutos('todos')">Todos</button>
            <button class="filtro-btn" onclick="filtrarProdutos('cao')">Cães</button>
            <button class="filtro-btn" onclick="filtrarProdutos('gato')">Gatos</button>
        </div>

        <div class="catalogo">
            <!-- PRODUTO 1 -->
            <div class="produto" data-categoria="cao">
                <a id="dog_0_link" href="./tela_produto.html?id=racaogolden.jpg">
                    <img class="catalogo_img" id="dog_0_img"src="./racaogolden.jpg" alt="Ração Golden">
                </a>
                <h4 id="dog_0_nome">Ração Golden Cães Adultos</h4>
                <p id="dog_0_preco">R$ 129,90</p>
                <div class="contador">
                    <button onclick="mudarQtd('golden', -1)">-</button>
                    <span id="qtd-golden">0</span>
                    <button onclick="mudarQtd('golden', 1)">+</button>
                </div>
                <button class="btn-add" onclick="">
                    Adicionar ao Carrinho
                </button>
            </div>
            <div class="produto" data-categoria="cao">
                <a id="dog_1_link" href="./tela_produto.html?id=racaogolden.jpg">
                    <img class="catalogo_img" id="dog_1_img"src="./racaogolden.jpg" alt="Ração Golden">
                </a>
                <h4 id="dog_1_nome">Ração Golden Cães Adultos</h4>
                <p id="dog_1_preco">R$ 129,90</p>
                <div class="contador">
                    <button onclick="mudarQtd('golden', -1)">-</button>
                    <span id="qtd-golden">0</span>
                    <button onclick="mudarQtd('golden', 1)">+</button>
                </div>
                <button class="btn-add" onclick="">
                    Adicionar ao Carrinho
                </button>
            </div>

            <!-- PRODUTO 2 - EXEMPLO -->
            <div class="produto" data-categoria="gato">
                <a id="gato_0_link" href="./tela_produto.html">
                    <img class="catalogo_img" id="gato_0_img" src="./racaogato.jpg" alt="Ração Gato">
                </a>
                <h4 id="gato_0_nome">Ração Premium Gatos</h4>
                <p id="gato_0_preco">R$ 89,90</p>
                <div class="contador">
                    <button onclick="mudarQtd('gato', -1)">-</button>
                    <span id="qtd-gato">0</span>
                    <button onclick="mudarQtd('gato', 1)">+</button>
                </div>
                <button class="btn-add" onclick="">
                    Adicionar ao Carrinho
                </button>
            </div>
        </div>

        <!-- CARRINHO - ALGO A MAIS 2 -->
        <div id="modal-carrinho" class="modal">
            <div class="modal-conteudo">
                <span class="fechar" onclick="fecharCarrinho()">&times;</span>
                <h3>Seu Carrinho</h3>
                <div id="itens-carrinho"></div>
                <p><strong>Total: R$ <span id="valor-total">0.00</span></strong></p>
                <button onclick="finalizarCompra()">Finalizar Compra</button>
            </div>
        </div>
    </main>

    <script src="./JS/main.js"></script>
</body>

</html>
