<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Percorre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="main.js"></script>
    <header>
        <nav>
            <a href="inicio.html">Início</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="contato.html">Contato</a>
            <div class="carrinho-icon" onclick="mostrarCarrinho()">
                🛒 <span id="total-itens">0</span>
            </div>
        </nav>
    </header>

    <main>
        <h1>Catálogo de Rações</h1>
        <h2>Confira os produtos que seu pet vai gostar!</h2>

        <!-- FILTRO - ALGO A MAIS 1 -->
        <div class="filtros">
            <button class="filtro-btn ativo" onclick="filtrarProdutos('todos')">Todos</button>
            <button class="filtro-btn" onclick="filtrarProdutos('cao')">Cães</button>
            <button class="filtro-btn" onclick="filtrarProdutos('gato')">Gatos</button>
        </div>

        <div class="catalogo">
            <!-- PRODUTO 1 -->
            <div class="produto" data-categoria="cao">
                <a href="./tela_produto.html">
                    <img src="./racaogolden.jpg" alt="Ração Golden">
                </a>
                <h4>Ração Golden Cães Adultos</h4>
                <p class="preco">R$ 129,90</p>
                <div class="contador">
                    <button onclick="mudarQtd('golden', -1)">-</button>
                    <span id="qtd-golden">0</span>
                    <button onclick="mudarQtd('golden', 1)">+</button>
                </div>
                <button class="btn-add" onclick="addCarrinho('Ração Golden', 129.90, 'golden')">
                    Adicionar ao Carrinho
                </button>
            </div>

            <!-- PRODUTO 2 - EXEMPLO -->
            <div class="produto" data-categoria="gato">
                <a href="./tela_produto.html">
                    <img src="./racaogato.jpg" alt="Ração Gato">
                </a>
                <h4>Ração Premium Gatos</h4>
                <p class="preco">R$ 89,90</p>
                <div class="contador">
                    <button onclick="mudarQtd('gato', -1)">-</button>
                    <span id="qtd-gato">0</span>
                    <button onclick="mudarQtd('gato', 1)">+</button>
                </div>
                <button class="btn-add" onclick="addCarrinho('Ração Gatos', 89.90, 'gato')">
                    Adicionar ao Carrinho
                </button>
            </div>
        </div>

        <!-- CARRINHO - ALGO A MAIS 2 -->
        <div id="modal-carrinho" class="modal">
            <div class="modal-conteudo">
                <span class="fechar" onclick="fecharCarrinho()">&times;</span>
                <h3>Seu Carrinho</h3>
                <div id="itens-carrinho"></div>
                <p><strong>Total: R$ <span id="valor-total">0.00</span></strong></p>
                <button onclick="finalizarCompra()">Finalizar Compra</button>
            </div>
        </div>
    </main>
</body>
</html>
